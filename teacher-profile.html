<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Teacher Profile - Student Locker</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<link href="assets/css/style.css" rel="stylesheet"><link href="assets/css/dashboard.css" rel="stylesheet">
</head><body>
<div data-layout="teacher">
  <div class="page-header"><div><h2>Teacher Profile</h2><p>Manage your personal information and password.</p></div></div>

  <div class="profile-shell">
    <div class="sl-card profile-overview">
      <div class="profile-avatar" id="teacherAvatarWrap">
        <i class="fas fa-user" id="teacherAvatarIcon"></i>
        <img id="teacherAvatarImg" alt="Profile Photo" style="display:none" />
      </div>
      <h4 id="profileSummaryName">Teacher Name</h4>
      <p class="text-muted mb-3" id="profileSummaryEmail">teacher@college.edu</p>
      <div class="d-flex flex-wrap gap-2">
        <span class="badge-verified"><i class="fas fa-id-badge me-1"></i><span id="teacherIdBadge">Teacher ID</span></span>
      </div>
    </div>

    <div class="sl-card profile-personal-details">
      <div class="section-title-row">
        <h5 class="mb-0"><i class="fas fa-user-tie me-2"></i>Personal Details</h5>
      </div>
      <div class="profile-details-grid">
        <div class="detail-row"><div class="detail-label">Name</div><div class="detail-value" id="roName">-</div></div>
        <div class="detail-row"><div class="detail-label">Teacher ID</div><div class="detail-value" id="roTid">-</div></div>
        <div class="detail-row"><div class="detail-label">Email</div><div class="detail-value" id="roEmail">-</div></div>
        <div class="detail-row"><div class="detail-label">Department</div><div class="detail-value" id="roDept">-</div></div>
        <div class="detail-row"><div class="detail-label">Phone Number</div><div class="detail-value" id="roPhone">-</div></div>
      </div>
    </div>

    <style>
      .profile-personal-details .profile-details-grid{display:grid;gap:.65rem}
      .profile-personal-details .detail-row{display:flex;justify-content:space-between;gap:1rem;padding:.6rem .8rem;border:1px solid var(--sl-border);border-radius:12px;background:var(--sl-white)}
      .profile-personal-details .detail-label{font-size:.85rem;color:var(--sl-muted);font-weight:600}
      .profile-personal-details .detail-value{font-size:.95rem;color:var(--sl-body-color, var(--sl-text));font-weight:600;text-align:right;word-break:break-word}
      #teacherAvatarWrap{position:relative}
      #teacherAvatarImg{width:92px;height:92px;border-radius:50%;object-fit:cover}
      #teacherAvatarIcon{font-size:3rem}
    </style>

    <div class="sl-card profile-form-card">
      <h5 class="mb-4"><i class="fas fa-lock me-2"></i>Change Password</h5>
      <form id="teacherPasswordForm">
        <div class="mb-3"><label class="form-label">Current Password</label><input name="current" type="password" class="form-control" required></div>
        <div class="mb-3"><label class="form-label">New Password</label><input name="next" type="password" class="form-control" required></div>
        <div class="mb-3"><label class="form-label">Confirm Password</label><input name="confirm" type="password" class="form-control" required></div>
        <button class="btn btn-outline-primary" type="submit"><i class="fas fa-key me-1"></i>Update Password</button>
      </form>
    </div>
  </div>
</div>

<script src="assets/js/app.js"></script>
<script src="assets/js/layout.js"></script>
<script>
  let user = JSON.parse(localStorage.getItem('sl_user')||'{}');
  let profile = JSON.parse(localStorage.getItem('sl_profile')||'{}');
  let profileData = {...user, ...profile};

  function avatarInit(){
    const photo = profileData.photo || profileData.profilePhoto || user.photo || '';
    const img = document.getElementById('teacherAvatarImg');
    const icon = document.getElementById('teacherAvatarIcon');
    if(photo){
      img.src = photo;
      img.style.display = 'block';
      if(icon) icon.style.display='none';
    } else {
      img.style.display = 'none';
      if(icon) icon.style.display='block';
    }
  }

  function populateTeacherProfile(){
    profileData = {...user, ...profile};

    const name = profileData.name || 'Teacher Name';
    const email = profileData.email || 'teacher@college.edu';
    const dept = profileData.dept || profileData.department || '-';
    const phone = profileData.phone || profileData.phoneNumber || '-';
    const tid = profileData.teacherId || profileData.tid || profileData.id || '-';
    const photo = profileData.photo || profileData.profilePhoto || '';

    document.getElementById('profileSummaryName').textContent = name;
    document.getElementById('profileSummaryEmail').textContent = email;
    document.getElementById('teacherIdBadge').textContent = tid || 'Teacher ID';

    document.getElementById('roName').textContent = name || '-';
    document.getElementById('roTid').textContent = tid || '-';
    document.getElementById('roEmail').textContent = email || '-';
    document.getElementById('roDept').textContent = dept || '-';
    document.getElementById('roPhone').textContent = phone || '-';

    avatarInit();
  }

  document.getElementById('teacherPasswordForm').addEventListener('submit', (e)=>{
    e.preventDefault();
    const form = e.target;
    const current = form.current.value;
    const next = form.next.value;
    const confirm = form.confirm.value;

    if(next.length < 6) return slToast('Password must be at least 6 characters', 'error');
    if(next !== confirm) return slToast('Passwords do not match', 'error');
    if(user.password && current !== user.password) return slToast('Current password is incorrect', 'error');

    user = {...user, password: next};
    localStorage.setItem('sl_user', JSON.stringify(user));
    slToast('Password updated successfully', 'success');
    form.reset();
  });

  populateTeacherProfile();
</script>
</body></html>
