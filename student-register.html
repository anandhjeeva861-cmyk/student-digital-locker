<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Student Registration - Student Locker</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<link href="assets/css/style.css" rel="stylesheet"><link href="assets/css/login.css" rel="stylesheet">
</head><body>
<div class="auth-wrapper"><div class="auth-card" style="max-width:560px">
  <div class="text-center">
    <div class="auth-logo"><i class="fas fa-user-plus"></i></div>
    <h3 class="auth-title">Student Registration</h3>
    <p class="auth-sub">Create your locker account</p>
    <div class="auth-badges">
      <span class="feature-pill"><i class="fas fa-shield-alt"></i>Secure</span>
      <span class="feature-pill"><i class="fas fa-bolt"></i>Fast</span>
      <span class="feature-pill"><i class="fas fa-star"></i>Premium</span>
    </div>
  </div>
  <form id="registerForm" novalidate>
    <div class="row g-3">
      <div class="col-md-6"><label class="form-label">Full Name</label><input name="fullName" class="form-control" required></div>
      <div class="col-md-6"><label class="form-label">Register Number</label><input name="registerNumber" class="form-control" required></div>
      <div class="col-md-6"><label class="form-label">Department</label>
        <select name="department" class="form-select" required>
<option value="">Select…</option><option>BSC CS</option><option>BSC IT</option><option>AI&ML</option><option>CSDA</option><option>BCOM</option><option>MBA</option>
        </select></div>
<div class="col-md-6"><label class="form-label">Year</label><input name="year" class="form-control" placeholder="e.g. III-A" required></div>
      <div class="col-md-6"><label class="form-label">Joining Year</label><input name="joiningYear" class="form-control" placeholder="e.g. 2025" inputmode="numeric" required></div>

      <div class="col-md-6"><label class="form-label">Mobile Number</label><input name="mobile" class="form-control" maxlength="10" required></div>
      <div class="col-12"><label class="form-label">College Email</label><input name="email" type="email" class="form-control" required></div>
      <div class="col-md-6"><label class="form-label">Password</label>
        <div class="password-field"><input name="password" type="password" class="form-control" required>
          <button type="button" class="toggle-pw"><i class="fas fa-eye"></i></button></div>
        <div class="pw-meter"><div class="bar"></div></div>
      </div>
      <div class="col-md-6"><label class="form-label">Confirm Password</label>
        <div class="password-field"><input name="confirmPassword" type="password" class="form-control" required>
          <button type="button" class="toggle-pw"><i class="fas fa-eye"></i></button></div>
      </div>
    </div>
    <div class="d-flex gap-2 mt-4">
      <button class="btn btn-primary flex-fill" type="submit">Register</button>
      <button class="btn btn-outline-secondary" type="reset">Reset</button>
      <button class="btn btn-link" type="button" onclick="location.href='index.html'">Cancel</button>
    </div>
  </form>
</div></div>
<script src="assets/js/app.js"></script><script src="assets/js/validation.js"></script><script src="assets/js/login.js"></script>
<script>handleRegister('registerForm');</script>
</body></html>
