<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Teacher Login - Student Locker</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<link href="assets/css/style.css" rel="stylesheet"><link href="assets/css/login.css" rel="stylesheet">
</head><body>
<div class="auth-wrapper"><div class="auth-card">
  <div class="text-center">
    <div class="auth-logo"><i class="fas fa-chalkboard-teacher"></i></div>
    <h3 class="auth-title">Teacher Login</h3>
    <p class="auth-sub">Access the teacher portal</p>
    <div class="auth-badges">
      <span class="feature-pill"><i class="fas fa-shield-alt"></i>Secure</span>
      <span class="feature-pill"><i class="fas fa-bolt"></i>Fast</span>
      <span class="feature-pill"><i class="fas fa-users"></i>Organized</span>
    </div>
  </div>
  <form id="teacherLoginForm" novalidate>
    <div class="mb-3"><label class="form-label">Email</label>
      <input name="email" type="email" class="form-control" placeholder="prof@college.edu" required></div>
    <div class="mb-2"><label class="form-label">Password</label>
      <div class="password-field">
        <input name="password" type="password" class="form-control" placeholder="••••••" required>
        <button type="button" class="toggle-pw"><i class="fas fa-eye"></i></button>
      </div></div>
    <div class="auth-links">
      <label><input type="checkbox" class="form-check-input me-1"> Remember me</label>
      <a href="#" onclick="event.preventDefault();slToast('Reset link sent to your email','success')">Forgot password?</a>
    </div>
    <button class="btn btn-primary w-100" type="submit">Login</button>
    <button type="button" class="btn btn-link w-100 mt-1" onclick="location.href='index.html'">← Back to Home</button>
  </form>
</div></div>
<script src="assets/js/app.js"></script><script src="assets/js/validation.js"></script><script src="assets/js/login.js"></script>
<script>handleTeacherLogin('teacherLoginForm');</script>
</body></html>
