<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Student Details Locker - Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<link href="assets/css/style.css" rel="stylesheet">
<link href="assets/css/login.css" rel="stylesheet">
<link href="assets/css/responsive.css" rel="stylesheet">
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="text-center">
      <div class="auth-logo"><i class="fas fa-graduation-cap"></i></div>
      <h3 class="auth-title">Student Details Locker</h3>
      <p class="auth-sub">Your digital documents, safely stored</p>
      <div class="auth-badges">
        <span class="feature-pill"><i class="fas fa-shield-alt"></i>Secure</span>
        <span class="feature-pill"><i class="fas fa-bolt"></i>Fast</span>
        <span class="feature-pill"><i class="fas fa-brain"></i>Smart</span>
      </div>
    </div>

    <div id="chooseRole">
    <div class="choose-grid">
        <div class="role-card" onclick="showLogin('student')">
          <i class="fas fa-user-graduate"></i>
          <h6 class="mb-1">Student Login</h6>
          <small class="text-muted">Access your documents</small>
        </div>
        <div class="role-card" onclick="location.href='teacher-login.html'">
          <i class="fas fa-chalkboard-teacher"></i>
          <h6 class="mb-1">Teacher Login</h6>
          <small class="text-muted">Manage students</small>
        </div>
      </div>
      <p class="text-center mt-4 mb-0">
        New student? <a href="student-register.html">Create an account</a>
        <span class="text-muted">|</span>
        New teacher? <a href="teacher-register.html">Register here</a>
      </p>
    </div>


    <form id="studentLoginForm" class="d-none mt-3" novalidate>
      <h5 class="mb-3"><i class="fas fa-user-graduate me-2 text-primary"></i>Student Login</h5>
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input name="email" type="email" class="form-control" placeholder="you@college.edu" required>
      </div>
      <div class="mb-2">
        <label class="form-label">Password</label>
        <div class="password-field">
          <input name="password" type="password" class="form-control" placeholder="••••••" required>
          <button type="button" class="toggle-pw" aria-label="Toggle password"><i class="fas fa-eye"></i></button>
        </div>
      </div>
      <div class="auth-links">
        <label><input type="checkbox" class="form-check-input me-1"> Remember me</label>
        <a href="#" onclick="event.preventDefault();slToast('Reset link sent to your email','success')">Forgot password?</a>
      </div>
      <button class="btn btn-primary w-100" type="submit">Login</button>
      <button class="btn btn-outline-primary w-100 mt-2" type="button" onclick="location.href='student-register.html'">Register as Student</button>
      <button type="button" class="btn btn-link w-100 mt-1" onclick="backToChoose()">← Back</button>
    </form>
  </div>
</div>

<script src="assets/js/app.js"></script>
<script src="assets/js/validation.js"></script>
<script src="assets/js/login.js"></script>
<script>
  function showLogin(role){
    document.getElementById('chooseRole').classList.add('d-none');
    document.getElementById('studentLoginForm').classList.remove('d-none');
  }
  function backToChoose(){
    document.getElementById('chooseRole').classList.remove('d-none');
    document.getElementById('studentLoginForm').classList.add('d-none');
  }
  handleLogin('studentLoginForm','student');
</script>
</body>
</html>
